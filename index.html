<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Thiaron">
    <meta name="theme-color" content="#1a1a2e">
    <title>Thiaron - Juego Educativo</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="src/css/style.css">
    <style>
        #update-banner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            background: #e8a020;
            color: #1a1a2e;
            text-align: center;
            padding: 10px 16px;
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        #update-banner:hover {
            background: #f0b030;
        }
    </style>
</head>
<body>
    <div id="update-banner" role="button" tabindex="0" aria-label="Nueva versión disponible">
        🔄 Haz click aquí para actualizar a la última versión
    </div>
    <div id="game-container"></div>

    <!-- Phaser 3 (local copy v3.60.0) -->
    <script src="src/phaser.min.js"></script>

    <!-- App version -->
    <script src="src/version.js"></script>

    <!-- Shared state -->
    <script src="src/GameState.js"></script>

    <!-- Scenes -->
    <script src="src/scenes/BootScene.js"></script>
    <script src="src/scenes/MenuScene.js"></script>
    <script src="src/scenes/HubScene.js"></script>
    <script src="src/scenes/MultiplicationScene.js"></script>
    <script src="src/scenes/SoccerScene.js"></script>
    <script src="src/scenes/BasketballScene.js"></script>
    <script src="src/scenes/AlphabetScene.js"></script>
    <script src="src/scenes/WordsScene.js"></script>
    <script src="src/scenes/EnglishScene.js"></script>
    <script src="src/scenes/MathScene.js"></script>

    <!-- Game entry point -->
    <script src="src/game.js"></script>

    <!-- Register Service Worker for PWA offline support -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.warn('Service Worker registration failed:', err);
                });
            });
        }
    </script>

    <!-- Version check: show update banner when a newer version.json is detected -->
    <script>
        (function () {
            var banner = document.getElementById('update-banner');

            function applyUpdate() {
                if ('caches' in window) {
                    caches.keys()
                        .then(function (keys) {
                            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                        })
                        .catch(function () {})
                        .then(function () { window.location.reload(); });
                } else {
                    window.location.reload();
                }
            }

            banner.addEventListener('click', applyUpdate);
            banner.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); applyUpdate(); }
            });

            function checkVersion() {
                if (typeof APP_VERSION === 'undefined') return;
                fetch('version.json', { cache: 'no-store' })
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        if (data.version && data.version !== APP_VERSION) {
                            banner.style.display = 'block';
                        }
                    })
                    .catch(function () { /* network unavailable – ignore */ });
            }

            var _checkInterval = null;
            var INITIAL_CHECK_DELAY_MS = 3000;   // wait for game to finish loading
            var VERSION_CHECK_INTERVAL_MS = 5 * 60 * 1000; // every 5 minutes

            function startChecking() {
                if (_checkInterval) return;
                setTimeout(checkVersion, INITIAL_CHECK_DELAY_MS);
                _checkInterval = setInterval(checkVersion, VERSION_CHECK_INTERVAL_MS);
            }

            function stopChecking() {
                if (_checkInterval) { clearInterval(_checkInterval); _checkInterval = null; }
            }

            // Check immediately after page load, then every 5 minutes.
            // Pause when the page is hidden to avoid unnecessary network requests.
            window.addEventListener('load', function () {
                startChecking();
                if ('hidden' in document) {
                    document.addEventListener('visibilitychange', function () {
                        if (document.hidden) { stopChecking(); } else { startChecking(); }
                    });
                }
            });
        }());
    </script>
</body>
</html>
